<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Premium dark background with subtle gradient -->
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0a"/>
      <stop offset="100%" style="stop-color:#070707"/>
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8c47a"/>
      <stop offset="50%" style="stop-color:#c9963a"/>
      <stop offset="100%" style="stop-color:#8a6420"/>
    </linearGradient>
  </defs>
  
  <!-- Rounded square background -->
  <rect width="64" height="64" rx="18" fill="url(#bgGrad)"/>
  
  <!-- Premium scissors design -->
  <g transform="translate(32, 32)">
    <!-- Scissors handles -->
    <circle cx="-8" cy="-8" r="6" fill="none" stroke="url(#goldGrad)" stroke-width="2"/>
    <circle cx="8" cy="-8" r="6" fill="none" stroke="url(#goldGrad)" stroke-width="2"/>
    
    <!-- Scissors blades -->
    <path d="M-8,-8 L0,4 L8,-8" fill="none" stroke="#f0f0f0" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M-8,-8 L0,4 L8,-8" fill="none" stroke="url(#goldGrad)" stroke-width="0.8" stroke-linecap="round" stroke-linejoin="round" transform="rotate(45)"/>
    
    <!-- Center pivot -->
    <circle cx="0" cy="4" r="2" fill="url(#goldGrad)"/>
    
    <!-- Subtle C letter integration -->
    <path d="M-12,8 Q-12,12 -8,12 L8,12 Q12,12 12,8" fill="none" stroke="#e8c47a" stroke-width="1" opacity="0.6"/>
  </g>
  
  <!-- Premium border -->
  <rect width="64" height="64" rx="18" fill="none" stroke="url(#goldGrad)" stroke-width="0.5" opacity="0.3"/>
</svg>
